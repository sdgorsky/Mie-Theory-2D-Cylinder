name: Version Bump Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version was bumped
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          MAIN_VERSION=$(git show origin/main~1:package.json 2>/dev/null | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version" 2>/dev/null || echo "0.0.0")

          echo "Previous version: $MAIN_VERSION"
          echo "Current version:  $CURRENT_VERSION"

          if [ "$CURRENT_VERSION" = "$MAIN_VERSION" ]; then
            echo "::error::Version in package.json ($CURRENT_VERSION) has not been bumped. Run 'npm version minor' or 'npm version major' before pushing to main."
            exit 1
          fi

          # Verify current version is greater than previous
          HIGHER=$(echo -e "$MAIN_VERSION\n$CURRENT_VERSION" | sort -V | tail -1)
          if [ "$HIGHER" != "$CURRENT_VERSION" ]; then
            echo "::error::Version $CURRENT_VERSION is not greater than previous version $MAIN_VERSION."
            exit 1
          fi

          echo "Version bump verified: $MAIN_VERSION -> $CURRENT_VERSION"
